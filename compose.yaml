services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-node-api
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: myapp
      PGUSER: postgres
      PGPASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  db:
    image: postgres:18
    container_name: my-postgres
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myapp"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
